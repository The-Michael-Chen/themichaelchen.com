<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Michael Chen</title>
    <meta
      name="description"
      content="Michael Chen's personal website. Robotics, startups, product work, and a linear archive of projects."
    />
    <meta name="color-scheme" content="light" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <p class="eyebrow">Robotics · Applied AI · Systems</p>
        <h1>Michael Chen</h1>
        <div class="vision-panel">
          <div id="vision-layout" class="vision-layout" aria-label="Vision statement"></div>
        </div>
        <nav class="primary-links" id="primary-links" aria-label="Primary links"></nav>
      </header>

      <main>
        <section class="section">
          <div class="section-heading">
            <h2>Current Work</h2>
          </div>
          <div class="section-body">
            <div id="current-work" class="stack"></div>
          </div>
        </section>

        <section class="section">
          <div class="section-heading">
            <h2>Education</h2>
          </div>
          <div class="section-body">
            <div id="education" class="stack"></div>
          </div>
        </section>

        <section class="section">
          <div class="section-heading">
            <h2>Projects</h2>
            <p class="section-note">A chronological archive of research, inventions, startups, and product work.</p>
          </div>
          <div class="section-body">
            <div id="projects" class="projects-list" aria-live="polite"></div>
          </div>
        </section>
      </main>
    </div>

    <div class="cursor-robot" id="cursor-robot" aria-hidden="true">
      <svg viewBox="0 0 88 88" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g class="robot-shadow">
          <ellipse cx="44" cy="79" rx="20" ry="4" fill="rgba(23, 20, 17, 0.14)" />
        </g>
        <g class="robot-body">
          <path d="M29 60h30l-4 10H33l-4-10Z" fill="#5e666c" />
          <path d="M24 69h40v6H24z" fill="#40474c" />
          <rect x="31" y="20" width="26" height="28" rx="8" fill="#d8ddd8" stroke="#2e3438" stroke-width="2.5" />
          <rect x="23" y="31" width="42" height="23" rx="11.5" fill="#d9d3c7" stroke="#2e3438" stroke-width="2.5" />
          <rect x="30" y="35" width="28" height="15" rx="7.5" fill="#1f2528" />
          <circle class="robot-eye robot-eye--left" cx="39" cy="42.5" r="3.4" fill="#f7f5ef" />
          <circle class="robot-eye robot-eye--right" cx="49" cy="42.5" r="3.4" fill="#f7f5ef" />
          <path d="M44 20V11" stroke="#2e3438" stroke-width="2.5" stroke-linecap="round" />
          <circle cx="44" cy="9" r="2.5" fill="#2e3438" />
          <path d="M34 60v10" stroke="#2e3438" stroke-width="2.5" stroke-linecap="round" />
          <path d="M54 60v10" stroke="#2e3438" stroke-width="2.5" stroke-linecap="round" />
          <path d="M23 34l-6 6" stroke="#2e3438" stroke-width="2.5" stroke-linecap="round" />
          <path d="M65 34l6 6" stroke="#2e3438" stroke-width="2.5" stroke-linecap="round" />
        </g>
      </svg>
    </div>

    <dialog class="image-modal" id="image-modal">
      <div class="image-modal__frame">
        <button class="image-modal__close" id="image-modal-close" type="button" aria-label="Close image">
          Close
        </button>
        <img id="image-modal-target" alt="" />
        <p id="image-modal-caption"></p>
      </div>
    </dialog>

    <script src="./data/site-data.js"></script>
    <script type="module" src="./script.js"></script>
  </body>
</html>
